version: '3.8'

services:
  miair:
    build: .
    container_name: miair
    # 使用 host 网络模式以支持 mDNS/SSDP 多播（AirPlay/DLNA 设备发现必需）
    # Linux 和 macOS 推荐此模式；Windows Docker Desktop 不支持 host 网络
    network_mode: "host"
    environment:
      # 小米账号（也可通过 Web 界面配置）
      - MI_USER=${MI_USER:-}
      # 小米密码
      - MI_PASS=${MI_PASS:-}
      # 设备 DID，多个设备用逗号分隔（留空则自动搜索）
      - MI_DID=${MI_DID:-}
      # 宿主机局域网 IP（留空则自动检测）
      - MIAIR_HOSTNAME=${MIAIR_HOSTNAME:-}
      - TZ=Asia/Shanghai
    volumes:
      # 持久化配置文件（登录 Token、config.json 等）
      - ./conf:/app/conf
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_BROADCAST
